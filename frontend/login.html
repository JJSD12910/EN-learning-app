<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#30331;&#24405; | &#27979;&#39564;&#31995;&#32479;</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="cx-login">
  <div class="cx-login-wrap">
    <div class="cx-login-panel">
      <section class="cx-login-left" aria-label="&#24179;&#21488;&#20171;&#32461;">
        <div class="cx-login-left-head">
          <div class="cx-login-brand">&#27979;&#39564;&#31995;&#32479;</div>
          <span class="cx-login-tag">&#38656;&#35201;&#30331;&#24405;</span>
        </div>
        <h1>&#27426;&#36814;&#20351;&#29992;&#25945;&#23398;&#27979;&#35797;&#24179;&#21488;</h1>
        <p>&#31649;&#29702;&#21592;&#31649;&#29702;&#23398;&#26657;&#21644;&#25945;&#24072;&#65292;&#21161;&#25945;&#36127;&#36131;&#39064;&#24211;&#19982;&#19994;&#21153;&#65292;&#25945;&#24072;&#36127;&#36131;&#35838;&#22530;&#27979;&#39564;&#19982;&#32467;&#26524;&#26597;&#30475;&#12290;</p>
        <div class="cx-illus-shell" aria-hidden="true">
          <div class="cx-illus-ring"></div>
          <div class="cx-illus-ring cx-illus-ring-b"></div>
          <div class="cx-illus-card"></div>
          <div class="cx-illus-chip cx-chip-a"></div>
          <div class="cx-illus-chip cx-chip-b"></div>
          <div class="cx-illus-chip cx-chip-c"></div>
          <div class="cx-illus-chip cx-chip-d"></div>
        </div>
        <div class="cx-login-slogan">&#26412;&#22320;&#37096;&#32626; &middot; &#22810;&#35282;&#33394;&#20998;&#24037; &middot; &#25968;&#25454;&#38381;&#29615;</div>
      </section>

      <section class="cx-login-right" aria-label="&#36134;&#21495;&#30331;&#24405;&#34920;&#21333;">
        <div class="cx-login-right-head"><div class="pill">&#36134;&#21495;&#30331;&#24405;</div></div>
        <div class="cx-role-row">
          <button class="btn secondary" type="button" data-role="admin">&#31649;&#29702;&#21592;</button>
          <button class="btn secondary" type="button" data-role="assistant">&#21161;&#25945;</button>
          <button class="btn secondary" type="button" data-role="teacher">&#25945;&#24072;</button>
        </div>
        <div class="status" id="role-hint">&#31649;&#29702;&#21592;&#31034;&#20363;&#65306;admin / admin123</div>
        <div class="stack cx-login-form">
          <div><label for="username">&#29992;&#25143;&#21517;</label><input id="username" type="text" placeholder="admin" autocomplete="username" /></div>
          <div><label for="password">&#23494;&#30721;</label><input id="password" type="password" placeholder="********" autocomplete="current-password" /></div>
          <div class="row"><button class="btn cx-login-submit" id="login-btn">&#30331;&#24405;</button></div>
          <div class="status" id="status" role="alert" aria-live="polite"></div>
        </div>
        <div class="footer">&#27979;&#39564;&#31995;&#32479; - &#20165;&#26412;&#22320;&#20351;&#29992; - &#38656;&#35201; Cookie</div>
      </section>
    </div>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const roleHint = document.getElementById('role-hint');

    document.getElementById('login-btn').addEventListener('click', login);
    document.querySelectorAll('[data-role]').forEach((el) => {
      el.addEventListener('click', () => {
        const role = el.dataset.role;
        if (role === 'teacher') {
          usernameEl.value = 'teacher';
          passwordEl.value = 'teacher123';
          roleHint.textContent = '教师示例：teacher / teacher123';
        } else if (role === 'assistant') {
          usernameEl.value = 'assistant';
          passwordEl.value = 'assistant123';
          roleHint.textContent = '助教示例：assistant / assistant123';
        } else {
          usernameEl.value = 'admin';
          passwordEl.value = 'admin123';
          roleHint.textContent = '管理员示例：admin / admin123';
        }
      });
    });

    function targetByRole(role) {
      if (role === 'admin') return '/admin';
      if (role === 'assistant') return '/assistant';
      if (role === 'teacher') return '/teacher';
      return '/';
    }

    async function login() {
      statusEl.textContent = '登录中...';
      statusEl.className = 'status';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username: usernameEl.value.trim(), password: passwordEl.value }),
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.error || '登录失败';
          statusEl.className = 'status error';
          return;
        }
        statusEl.textContent = '登录成功，正在跳转...';
        statusEl.className = 'status ok';
        setTimeout(() => (window.location.href = targetByRole(data.role)), 400);
      } catch (err) {
        statusEl.textContent = '请求失败: ' + err;
        statusEl.className = 'status error';
      }
    }

    (async function checkSession() {
      try {
        const res = await fetch('/auth/status', { credentials: 'same-origin' });
        if (!res.ok) return;
        const data = await res.json();
        if (data.authenticated) window.location.href = targetByRole(data.role);
      } catch (err) {}
    })();
  </script>
</body>
</html>
