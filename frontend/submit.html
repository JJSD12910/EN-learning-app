<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提交中心 | 测验系统</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="cx-app">
  <div class="cx-home-shell">
    <header class="cx-topbar"><div class="cx-topbar-inner"><div class="cx-school-title">测验系统</div><div class="cx-top-actions"><a href="/logout" class="cx-logout-btn">退出登录</a></div></div></header>
    <div class="cx-main-layout">
      <aside class="cx-sidebar" aria-label="主导航"><div class="cx-avatar-card"><div class="cx-avatar-circle">SB</div><p class="cx-avatar-name">提交中心</p></div><nav class="cx-side-menu"><a href="/">首页</a><a class="active" href="/submit">提交</a><a href="/records">记录</a><a href="/admin">管理</a></nav></aside>
      <main class="cx-content-area">
        <div class="cx-content-stack">
          <section class="cx-course-board compact"><h1>提交分数或答案</h1><p>可直接提交分数，也可提交答案由服务端判分。</p></section>
          <div class="cx-grid-2">
            <section class="section">
              <h2>提交载荷</h2>
              <textarea id="payload">{
  "user_id": "001",
  "quiz_id": "REPLACE_WITH_QUIZ_ID",
  "score": 0,
  "total": 10,
  "wrong": []
}</textarea>
              <div class="row"><button class="btn" id="send-btn">提交到 /submit</button><button class="btn secondary" id="load-btn">加载示例（3题）</button><span class="status" id="status"></span></div>
            </section>
            <section class="section">
              <h2>提交结果</h2>
              <div id="result-summary" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;"></div>
              <div id="wrong-list" class="stack" style="margin-top:10px;"></div>
              <details style="margin-top:10px;"><summary class="muted">查看原始 JSON</summary><pre id="result-raw" class="cx-output-panel" data-kind="json" data-empty="等待请求结果"></pre></details>
            </section>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const payloadEl = document.getElementById('payload');
    const resultRawEl = document.getElementById('result-raw');
    const statusEl = document.getElementById('status');
    const resultSummary = document.getElementById('result-summary');
    const wrongList = document.getElementById('wrong-list');
    document.getElementById('send-btn').addEventListener('click', send);
    document.getElementById('load-btn').addEventListener('click', loadSample);

    async function send() {
      statusEl.textContent = '发送中...';
      statusEl.className = 'status';
      try {
        const res = await fetch('/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payloadEl.value });
        const text = await res.text();
        let data = null;
        try { data = JSON.parse(text); } catch {}
        renderResult(res.status, res.ok, data, text);
        statusEl.textContent = res.ok ? '提交成功' : '提交失败';
        statusEl.className = res.ok ? 'status ok' : 'status error';
      } catch (err) {
        statusEl.textContent = '请求失败: ' + err;
        statusEl.className = 'status error';
      }
    }

    async function loadSample() {
      statusEl.textContent = '加载题目中...';
      statusEl.className = 'status';
      try {
        const res = await fetch('/questions?user_id=001&count=3');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '加载失败');
        payloadEl.value = JSON.stringify({ user_id: data.user_id, quiz_id: data.quiz_id, score: 0, total: data.total ?? data.questions.length, wrong: [], answers: (data.questions || []).map(q => ({ id: q.id, choice: 0 })) }, null, 2);
        statusEl.textContent = '示例已填充，请调整后提交';
        statusEl.className = 'status ok';
      } catch (err) {
        statusEl.textContent = '请求失败: ' + err;
        statusEl.className = 'status error';
      }
    }

    function renderResult(statusCode, ok, data, rawText) {
      resultSummary.innerHTML = '';
      const wrongCount = Array.isArray(data?.wrong) ? data.wrong.length : 0;
      resultSummary.innerHTML = `<div class="card"><div class="pill">状态</div><h3 style="margin:6px 0 4px;">${statusCode ?? '-'}</h3><p class="muted">${ok ? '请求成功' : '请求失败'}</p></div><div class="card"><div class="pill">分数</div><h3 style="margin:6px 0 4px;">${data?.score ?? '-'} / ${data?.total ?? '-'}</h3><p class="muted">由服务端计算</p></div><div class="card"><div class="pill">错题数</div><h3 style="margin:6px 0 4px;">${wrongCount}</h3><p class="muted">本次提交判错题目数</p></div>`;
      wrongList.innerHTML = '';
      if (wrongCount > 0) {
        data.wrong.forEach((w, idx) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<div class="pill">#${idx + 1}</div><h3 style="margin:6px 0 4px;">${w.id || '-'}</h3><p class="muted">正确: ${w.correct ?? '-'} · 你的: ${w.your ?? '-'}</p>`;
          wrongList.appendChild(card);
        });
      } else {
        wrongList.innerHTML = '<div class="muted">本次无错题</div>';
      }
      resultRawEl.textContent = data ? JSON.stringify(data, null, 2) : (rawText || '无响应');
    }
  </script>
</body>
</html>
