<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理员控制台 | 测验系统</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body class="cx-app cx-admin">
<div class="cx-home-shell">
  <header class="cx-topbar">
    <div class="cx-topbar-inner">
      <div class="cx-school-title">测验系统</div>
      <div class="cx-top-actions">
        <span class="cx-top-chip">用户：<strong id="user-label">-</strong></span>
        <span class="cx-top-chip">角色：<strong id="role-label">-</strong></span>
        <a href="/logout" class="cx-logout-btn">退出登录</a>
      </div>
    </div>
  </header>
  <div class="cx-main-layout">
    <aside class="cx-sidebar" aria-label="管理员导航">
      <div class="cx-avatar-card">
        <div class="cx-avatar-circle">AD</div>
        <p class="cx-avatar-name">管理员控制台</p>
      </div>
      <nav class="cx-side-menu" id="admin-menu">
        <a class="active" href="#" data-panel="panel-overview">总览</a>
        <a href="#" data-panel="panel-teachers">教师账号</a>
        <a href="#" data-panel="panel-schools">学校管理</a>
      </nav>
    </aside>
    <main class="cx-content-area">
      <div class="cx-content-stack">
        <section class="cx-course-board compact">
          <h1>管理员控制台</h1>
          <p>仅负责学校管理与教师账号生命周期管理。</p>
        </section>

        <section class="section admin-panel" id="panel-overview">
          <h2>总览</h2>
          <div class="row">
            <button class="btn secondary" type="button" id="refresh-btn">刷新全部</button>
            <span class="status" id="overview-status"></span>
          </div>
          <div class="grid" style="margin-top:10px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;">
            <div class="card"><div class="pill">学校数</div><h3 id="ov-school-count">-</h3></div>
            <div class="card"><div class="pill">教师数</div><h3 id="ov-teacher-count">-</h3></div>
            <div class="card"><div class="pill">启用教师</div><h3 id="ov-active-count">-</h3></div>
            <div class="card"><div class="pill">最近登录</div><h3 id="ov-last-login">-</h3></div>
          </div>
        </section>

        <section class="section admin-panel" id="panel-teachers" style="display:none;">
          <h2>教师账号管理</h2>
          <div class="row">
            <input id="teacher-q" type="text" placeholder="搜索用户名/显示名" />
            <select id="teacher-active">
              <option value="">全部状态</option>
              <option value="1">启用</option>
              <option value="0">禁用</option>
            </select>
            <button class="btn secondary" type="button" id="teacher-refresh-btn">刷新</button>
          </div>
          <section class="section" style="margin-top:12px;">
            <h3 style="margin-top:0;">教师表单</h3>
            <div class="row">
              <input id="teacher-current-username" type="hidden" />
              <input id="teacher-username" type="text" placeholder="用户名" />
              <input id="teacher-password" type="password" placeholder="新建时输入初始密码（>=6）" />
              <input id="teacher-display-name" type="text" placeholder="显示名称" />
            </div>
            <div class="row" style="margin-top:8px;">
              <div style="flex:1;">
                <label for="teacher-valid-from">有效期开始</label>
                <input id="teacher-valid-from" type="date" />
              </div>
              <div style="flex:1;">
                <label for="teacher-valid-to">有效期结束</label>
                <input id="teacher-valid-to" type="date" />
              </div>
            </div>
            <div class="row" style="margin-top:8px;">
              <button class="btn" type="button" id="teacher-create-btn">新建教师</button>
              <button class="btn secondary" type="button" id="teacher-save-btn">保存资料</button>
              <button class="btn secondary" type="button" id="teacher-reset-form-btn">清空表单</button>
              <span class="status" id="teacher-status"></span>
            </div>
          </section>
          <div class="table-scroll" style="margin-top:10px;">
            <table class="table" id="teachers-table">
              <thead>
                <tr>
                  <th>用户名</th>
                  <th>显示名称</th>
                  <th>状态</th>
                  <th>有效期开始</th>
                  <th>有效期结束</th>
                  <th>最近登录</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section class="section admin-panel" id="panel-schools" style="display:none;">
          <h2>学校管理</h2>
          <div class="row">
            <input id="school-name" type="text" placeholder="学校名称" />
            <button class="btn" type="button" id="school-create-btn">创建学校</button>
            <input id="school-q" type="text" placeholder="搜索学校" />
            <button class="btn secondary" type="button" id="school-refresh-btn">刷新</button>
            <span class="status" id="school-status"></span>
          </div>
          <div class="table-scroll" style="margin-top:10px;">
            <table class="table" id="schools-table">
              <thead><tr><th>ID</th><th>学校名称</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>
</div>
<script>
const $ = (id) => document.getElementById(id);
const state = { teachers: [], schools: [] };

function setStatus(el, text, ok = null) {
  if (!el) return;
  el.textContent = text || '';
  el.className = ok === true ? 'status ok' : ok === false ? 'status error' : 'status';
}

async function api(url, options = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', ...options });
  const body = await res.json().catch(() => ({}));
  if (!res.ok || (typeof body.code === 'number' && body.code !== 0)) throw new Error(body.message || body.error || `HTTP ${res.status}`);
  return body.data !== undefined ? body.data : body;
}

function switchPanel(panelId) {
  document.querySelectorAll('.admin-panel').forEach((p) => p.style.display = p.id === panelId ? 'block' : 'none');
  document.querySelectorAll('#admin-menu a').forEach((a) => a.classList.toggle('active', a.dataset.panel === panelId));
}

async function loadProfile() {
  const data = await (await fetch('/auth/status', { credentials: 'same-origin' })).json();
  if (!data.authenticated) return (location.href = '/login');
  if (data.role !== 'admin') return (location.href = '/');
  $('user-label').textContent = data.user || '-';
  $('role-label').textContent = data.role || '-';
}

function formatDate(v) {
  return v ? String(v).slice(0, 10) : '-';
}

function renderOverview() {
  $('ov-school-count').textContent = state.schools.length;
  $('ov-teacher-count').textContent = state.teachers.length;
  $('ov-active-count').textContent = state.teachers.filter((t) => Number(t.is_active) === 1).length;
  const latest = state.teachers.map((t) => t.last_login_at).filter(Boolean).sort().reverse()[0];
  $('ov-last-login').textContent = latest || '-';
}

async function loadTeachers() {
  const q = new URLSearchParams({ limit: '100', offset: '0' });
  if ($('teacher-q').value.trim()) q.set('q', $('teacher-q').value.trim());
  if ($('teacher-active').value) q.set('is_active', $('teacher-active').value);
  const data = await api('/api/admin/teachers?' + q.toString());
  state.teachers = data.items || [];
  const tbody = document.querySelector('#teachers-table tbody');
  tbody.innerHTML = '';
  state.teachers.forEach((row) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.username}</td><td>${row.display_name || '-'}</td><td>${Number(row.is_active) === 1 ? '启用' : '禁用'}</td><td>${formatDate(row.valid_from)}</td><td>${formatDate(row.valid_to)}</td><td>${row.last_login_at || '-'}</td><td></td>`;
    tr.addEventListener('click', () => fillTeacherForm(row));
    const ops = tr.querySelector('td:last-child');
    [['编辑', 'btn secondary', () => fillTeacherForm(row)], ['重置密码', 'btn secondary', () => resetTeacherPassword(row.username)], [Number(row.is_active) === 1 ? '禁用' : '启用', Number(row.is_active) === 1 ? 'btn danger' : 'btn', () => toggleTeacher(row.username, Number(row.is_active) !== 1)]].forEach(([label, cls, fn]) => {
      const btn = document.createElement('button');
      btn.className = cls;
      btn.type = 'button';
      btn.textContent = label;
      btn.onclick = fn;
      ops.appendChild(btn);
    });
    tbody.appendChild(tr);
  });
  if (!tbody.children.length) tbody.innerHTML = '<tr><td colspan="7" class="muted">暂无教师账号</td></tr>';
  renderOverview();
}

function fillTeacherForm(row) {
  $('teacher-current-username').value = row.username || '';
  $('teacher-username').value = row.username || '';
  $('teacher-username').disabled = true;
  $('teacher-password').value = '';
  $('teacher-display-name').value = row.display_name || '';
  $('teacher-valid-from').value = row.valid_from ? String(row.valid_from).slice(0, 10) : '';
  $('teacher-valid-to').value = row.valid_to ? String(row.valid_to).slice(0, 10) : '';
  setStatus($('teacher-status'), `已载入教师 ${row.username}`, true);
}

function resetTeacherForm() {
  $('teacher-current-username').value = '';
  $('teacher-username').value = '';
  $('teacher-username').disabled = false;
  $('teacher-password').value = '';
  $('teacher-display-name').value = '';
  $('teacher-valid-from').value = '';
  $('teacher-valid-to').value = '';
  setStatus($('teacher-status'), '表单已清空', true);
}

function teacherPayload(includePassword) {
  const payload = {
    display_name: $('teacher-display-name').value.trim() || null,
    valid_from: $('teacher-valid-from').value || null,
    valid_to: $('teacher-valid-to').value || null,
  };
  if (includePassword) payload.password = $('teacher-password').value;
  return payload;
}

async function createTeacher() {
  const username = $('teacher-username').value.trim();
  const password = $('teacher-password').value;
  if (!username || !password) throw new Error('用户名和初始密码必填');
  const payload = { username, ...teacherPayload(true) };
  await api('/api/admin/teachers', { method: 'POST', body: JSON.stringify(payload) });
  resetTeacherForm();
  await loadTeachers();
  setStatus($('teacher-status'), '教师账号已创建', true);
}

async function saveTeacher() {
  const username = $('teacher-current-username').value.trim();
  if (!username) throw new Error('请先从列表选择教师');
  await api(`/api/admin/teachers/${encodeURIComponent(username)}/profile`, { method: 'PUT', body: JSON.stringify(teacherPayload(false)) });
  await loadTeachers();
  setStatus($('teacher-status'), '教师资料已保存', true);
}

async function toggleTeacher(username, enable) {
  const ok = confirm(`确认${enable ? '启用' : '禁用'} ${username}？`);
  if (!ok) return;
  const action = enable ? 'enable' : 'disable';
  const confirmCode = enable ? 'ENABLE_TEACHER' : 'DISABLE_TEACHER';
  await api(`/api/admin/teachers/${encodeURIComponent(username)}/${action}`, { method: 'POST', body: JSON.stringify({ confirm: confirmCode }) });
  await loadTeachers();
}

async function resetTeacherPassword(username) {
  const next = prompt(`请输入 ${username} 的新密码（至少 6 位）`, '');
  if (next === null) return;
  await api(`/api/admin/teachers/${encodeURIComponent(username)}/password/reset`, { method: 'POST', body: JSON.stringify({ confirm: 'RESET_TEACHER_PASSWORD', new_password: next }) });
  setStatus($('teacher-status'), `已重置 ${username} 的密码`, true);
}

async function loadSchools() {
  const q = new URLSearchParams({ limit: '100', offset: '0' });
  if ($('school-q').value.trim()) q.set('q', $('school-q').value.trim());
  const data = await api('/api/admin/schools?' + q.toString());
  state.schools = data.items || [];
  const tbody = document.querySelector('#schools-table tbody');
  tbody.innerHTML = '';
  state.schools.forEach((row) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.id}</td><td>${row.name}</td>`;
    tbody.appendChild(tr);
  });
  if (!tbody.children.length) tbody.innerHTML = '<tr><td colspan="2" class="muted">暂无学校</td></tr>';
  renderOverview();
}

async function createSchool() {
  const name = $('school-name').value.trim();
  if (!name) throw new Error('学校名称不能为空');
  await api('/api/admin/schools', { method: 'POST', body: JSON.stringify({ name }) });
  $('school-name').value = '';
  await loadSchools();
  setStatus($('school-status'), '学校已创建', true);
}

async function refreshAll() {
  await Promise.all([loadTeachers(), loadSchools()]);
  renderOverview();
  setStatus($('overview-status'), '数据已刷新', true);
}

function bindEvents() {
  document.querySelectorAll('#admin-menu a').forEach((a) => a.addEventListener('click', (e) => {
    e.preventDefault();
    switchPanel(a.dataset.panel);
  }));
  $('refresh-btn').onclick = () => refreshAll().catch((e) => setStatus($('overview-status'), e.message, false));
  $('teacher-refresh-btn').onclick = () => loadTeachers().catch((e) => setStatus($('teacher-status'), e.message, false));
  $('teacher-create-btn').onclick = () => createTeacher().catch((e) => setStatus($('teacher-status'), e.message, false));
  $('teacher-save-btn').onclick = () => saveTeacher().catch((e) => setStatus($('teacher-status'), e.message, false));
  $('teacher-reset-form-btn').onclick = resetTeacherForm;
  $('school-refresh-btn').onclick = () => loadSchools().catch((e) => setStatus($('school-status'), e.message, false));
  $('school-create-btn').onclick = () => createSchool().catch((e) => setStatus($('school-status'), e.message, false));
}

(async function init() {
  switchPanel('panel-overview');
  bindEvents();
  await loadProfile();
  await refreshAll();
  resetTeacherForm();
})().catch((e) => setStatus($('overview-status'), e.message, false));
</script>
</body>
</html>
