<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教师端 | 测验系统</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="cx-app cx-teacher">
  <div class="cx-home-shell">
    <header class="cx-topbar"><div class="cx-topbar-inner"><div class="cx-school-title">测验系统</div><div class="cx-top-actions"><span class="cx-top-chip">用户：<strong id="user-label">-</strong></span><span class="cx-top-chip">角色：<strong id="role-label">-</strong></span><a href="/logout" class="cx-logout-btn">退出登录</a></div></div></header>
    <div class="cx-main-layout">
      <aside class="cx-sidebar" aria-label="教师导航">
        <div class="cx-avatar-card"><div class="cx-avatar-circle">TE</div><p class="cx-avatar-name">教师控制台</p></div>
        <nav class="cx-side-menu" id="teacher-menu">
          <a class="active" href="#" data-panel="panel-classes">班级与名册</a>
          <a href="#" data-panel="panel-exams">考试管理</a>
          <a href="#" data-panel="panel-scores">班级成绩</a>
          <a href="#" data-panel="panel-student">学生详情与回放</a>
          <a href="#" data-panel="panel-practices">强化练习管理</a>
          <a href="#" data-panel="panel-analysis">分析与导出</a>
        </nav>
      </aside>
      <main class="cx-content-area">
        <div class="cx-content-stack">
          <section class="cx-course-board compact"><h1>教师端一期联调台</h1><p>术语统一：考试、作答、成绩、错题、分析、导出、强化。</p></section>

          <section class="section teacher-panel" id="panel-classes">
            <h2>班级与名册</h2>
            <div class="row"><button class="btn" id="btn-load-classes">刷新班级</button><label for="class-select">班级</label><select id="class-select"></select><button class="btn secondary" id="btn-load-students">查看名册</button></div>
            <div class="table-scroll" style="margin-top:10px;"><table class="table" id="classes-table"><thead><tr><th>班级ID</th><th>学校</th><th>年级</th><th>班级</th><th>状态</th><th>学生数</th></tr></thead><tbody></tbody></table></div>
            <div class="table-scroll" style="margin-top:10px;"><table class="table" id="students-table"><thead><tr><th>学生ID</th><th>学号</th><th>姓名</th><th>性别</th><th>状态</th></tr></thead><tbody></tbody></table></div>
          </section>

          <section class="section teacher-panel" id="panel-exams" style="display:none;">
            <h2>考试管理</h2>
            <div class="row">
              <input id="exam-title" placeholder="考试标题" />
              <input id="exam-count" type="number" value="10" min="1" />
              <input id="exam-category" placeholder="分类（可选）" />
              <input id="exam-start-at" type="datetime-local" />
              <input id="exam-end-at" type="datetime-local" />
            </div>
            <div class="row" style="margin-top:8px;">
              <input id="exam-question-ids" placeholder="固定题目ID（逗号分隔，可选）" />
              <label><input id="exam-allow-multiple" type="checkbox" /> 允许多次作答</label>
              <button class="btn" type="button" id="btn-create-exam">创建草稿</button>
            </div>
            <div class="row" style="margin-top:8px;">
              <input id="exam-filter-class" placeholder="班级ID（可空）" />
              <select id="exam-filter-status">
                <option value="">默认（不含归档）</option>
                <option value="draft">草稿</option>
                <option value="published">已发布</option>
                <option value="active">进行中</option>
                <option value="ended">已结束</option>
                <option value="archived">已归档</option>
              </select>
              <input id="exam-filter-keyword" placeholder="关键词（考试ID/标题）" />
              <button class="btn secondary" type="button" id="btn-load-exams">刷新考试列表</button>
            </div>
            <div class="table-scroll" style="margin-top:10px;"><table class="table" id="exams-table"><thead><tr><th>考试ID</th><th>标题</th><th>班级</th><th>题量</th><th>状态</th><th>开始时间</th><th>结束时间</th><th>提交数</th><th>操作</th></tr></thead><tbody></tbody></table></div>
            <div class="row" style="margin-top:8px;"><input id="exam-id" placeholder="考试ID" /><button class="btn secondary" type="button" id="btn-load-exam-detail">考试详情</button><button class="btn secondary" type="button" id="btn-load-exam-questions">固定卷题目</button></div>
            <section class="section" style="margin-top:10px;">
              <h3 style="margin-top:0;">考试详情与生命周期</h3>
              <div class="row">
                <span class="pill">当前状态：<strong id="exam-detail-status">-</strong></span>
                <span class="pill">尝试数：<strong id="exam-detail-attempts">-</strong></span>
                <span class="pill">提交数：<strong id="exam-detail-submitted">-</strong></span>
                <span class="pill">均分：<strong id="exam-detail-avg">-</strong></span>
              </div>
              <div class="row" style="margin-top:8px;">
                <input id="exam-detail-title" placeholder="标题" />
                <input id="exam-detail-class" placeholder="班级ID（仅草稿可改）" />
                <input id="exam-detail-count" type="number" min="1" placeholder="题量（草稿）" />
                <input id="exam-detail-category" placeholder="分类（草稿）" />
              </div>
              <div class="row" style="margin-top:8px;">
                <input id="exam-detail-start-at" type="datetime-local" />
                <input id="exam-detail-end-at" type="datetime-local" />
                <input id="exam-detail-question-ids" placeholder="固定题目ID（草稿）" />
                <label><input id="exam-detail-allow-multiple" type="checkbox" /> 允许多次作答</label>
              </div>
              <div class="row" style="margin-top:8px;">
                <button class="btn secondary" type="button" id="btn-exam-update">保存</button>
                <button class="btn" type="button" id="btn-exam-publish">发布</button>
                <button class="btn secondary" type="button" id="btn-exam-unpublish">撤回</button>
                <button class="btn secondary" type="button" id="btn-exam-end">结束</button>
                <button class="btn secondary" type="button" id="btn-exam-archive">归档</button>
                <button class="btn danger" type="button" id="btn-exam-delete">删除</button>
              </div>
              <div id="exam-action-status" class="status"></div>
            </section>
            <section id="exam-json" class="cx-output-panel cx-smart-output" data-kind="json" data-empty="暂无考试详情数据"></section>
          </section>

          <section class="section teacher-panel" id="panel-scores" style="display:none;">
            <h2>班级成绩</h2>
            <div class="row"><input id="scores-class-id" placeholder="班级ID" /><input id="scores-exam-id" placeholder="考试ID" /><button class="btn" id="btn-load-scores">刷新成绩</button></div>
            <div class="table-scroll" style="margin-top:10px;"><table class="table" id="scores-table"><thead><tr><th>学生ID</th><th>学号</th><th>姓名</th><th>作答ID</th><th>分数</th><th>正确率</th></tr></thead><tbody></tbody></table></div>
          </section>

          <section class="section teacher-panel" id="panel-student" style="display:none;">
            <h2>学生详情 / 作答回放 / 错题本</h2>
            <div class="row"><input id="student-id" placeholder="学生ID" /><button class="btn" id="btn-student-overview">学生概览</button><button class="btn secondary" id="btn-student-attempts">作答记录</button><button class="btn secondary" id="btn-student-wrongs">错题本</button><button class="btn secondary" id="btn-student-analysis">学生分析</button></div>
            <div class="row" style="margin-top:8px;"><input id="attempt-id" placeholder="作答ID" /><button class="btn secondary" id="btn-attempt-detail">作答回放</button><input id="practice-count" type="number" value="10" min="1" /><input id="practice-title" placeholder="练习标题（可空）" /><button class="btn secondary" id="btn-practice">生成错题强化</button></div>
            <section id="student-json" class="cx-output-panel cx-smart-output" data-kind="json" data-empty="暂无学生详情数据"></section>
          </section>

          <section class="section teacher-panel" id="panel-analysis" style="display:none;">
            <h2>导出中心</h2>
            <div class="row"><input id="analysis-class-id" placeholder="班级ID" /><input id="analysis-exam-id" placeholder="考试ID（可空）" /></div>
            <div class="row" style="margin-top:8px;"><button class="btn secondary" id="btn-export-scores">导出成绩（Excel）</button><button class="btn secondary" id="btn-export-wrongs">导出错题（Excel）</button></div>
            <div id="download-links" class="stack"></div>
          </section>

          <section class="section teacher-panel" id="panel-practices" style="display:none;">
            <h2>个人错题强化管理</h2>
            <div class="row"><input id="practice-student-id" placeholder="学生ID（可空）" /><input id="practice-status" placeholder="状态（published/archived）" value="published" /><button class="btn" id="btn-load-practices">刷新练习列表</button></div>
            <div class="table-scroll" style="margin-top:10px;"><table class="table" id="practices-table"><thead><tr><th>练习ID</th><th>标题</th><th>学生</th><th>题量</th><th>状态</th><th>创建时间</th><th>最新作答</th><th>操作</th></tr></thead><tbody></tbody></table></div>
            <div class="row" style="margin-top:8px;"><input id="effects-student-id" placeholder="学生ID" /><button class="btn secondary" id="btn-load-effects">查看练习效果</button></div>
            <section id="effects-json" class="cx-output-panel cx-smart-output" data-kind="json" data-empty="暂无练习效果数据"></section>
          </section>

          <div id="status" class="status"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/smart-output.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const classesBody = document.querySelector('#classes-table tbody');
    const studentsBody = document.querySelector('#students-table tbody');
    const examsBody = document.querySelector('#exams-table tbody');
    const scoresBody = document.querySelector('#scores-table tbody');
    const practicesBody = document.querySelector('#practices-table tbody');
    const classSelect = document.getElementById('class-select');
    const downloadLinks = document.getElementById('download-links');
    const examActionStatusEl = document.getElementById('exam-action-status');
    const examJsonEl = document.getElementById('exam-json');
    const smartOutput = window.CXSmartOutput || {
      renderStatus(el, text, ok) {
        if (!el) return;
        el.textContent = text || '';
        el.className = ok === false ? 'status error' : (ok === true ? 'status ok' : 'status');
      },
      render(el, data) {
        if (!el) return;
        el.textContent = JSON.stringify(data, null, 2);
      },
      renderEmpty(el) {
        if (!el) return;
        el.textContent = '';
      }
    };
    let currentExam = null;
    const dialogConfirm = (message, options = {}) => {
      if (typeof smartOutput.confirm === 'function') return smartOutput.confirm(message, options);
      return Promise.resolve(confirm(message));
    };

    function setStatus(text, ok = true) { smartOutput.renderStatus(statusEl, text, ok); }
    function setExamActionStatus(text, ok = true) { smartOutput.renderStatus(examActionStatusEl, text, ok); }
    function asJson(el, data, title = '结果详情') { smartOutput.render(el, data, { title }); }

    async function api(url, options = {}) {
      const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', ...options });
      const body = await res.json().catch(() => ({}));
      if (!res.ok || (typeof body.code === 'number' && body.code !== 0)) throw new Error((body && body.message) || (body && body.error) || `HTTP ${res.status}`);
      return body && body.data !== undefined ? body.data : body;
    }

    function switchPanel(panelId) {
      document.querySelectorAll('.teacher-panel').forEach(p => p.style.display = p.id === panelId ? 'block' : 'none');
      document.querySelectorAll('#teacher-menu a').forEach(a => a.classList.toggle('active', a.dataset.panel === panelId));
    }

    async function loadProfile() {
      const data = await (await fetch('/auth/status', { credentials: 'same-origin' })).json();
      const userName = data?.user ?? data?.username ?? '-';
      const roleName = data?.role ?? data?.current_role ?? '-';
      const authenticated = typeof data?.authenticated === 'boolean' ? data.authenticated : Boolean(data?.user || data?.username);
      if (!authenticated) return (location.href = '/login');
      document.getElementById('user-label').textContent = userName;
      document.getElementById('role-label').textContent = roleName;
    }

    function bindClick(id, handler) {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('click', handler);
    }

    async function loadClasses() {
      const data = await api('/api/teacher/classes?limit=50&offset=0');
      classesBody.innerHTML = '';
      classSelect.innerHTML = '';
      (data.items || []).forEach((row, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.class_id}</td><td>${row.school_name || '-'}</td><td>${row.grade || '-'}</td><td>${row.name || '-'}</td><td>${row.status || '-'}</td><td>${row.student_count ?? 0}</td>`;
        classesBody.appendChild(tr);
        const opt = document.createElement('option');
        opt.value = row.class_id; opt.textContent = `${row.class_id} - ${row.name}`; if (idx === 0) opt.selected = true;
        classSelect.appendChild(opt);
      });
      if (classSelect.value) {
        document.getElementById('scores-class-id').value = classSelect.value;
        document.getElementById('analysis-class-id').value = classSelect.value;
      }
      setStatus('班级加载完成');
    }

    async function loadStudents() {
      if (!classSelect.value) return;
      const data = await api(`/api/teacher/classes/${classSelect.value}/students?limit=200&offset=0`);
      studentsBody.innerHTML = '';
      (data.items || []).forEach((row) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.student_id}</td><td>${row.student_no || '-'}</td><td>${row.name || '-'}</td><td>${row.gender || '-'}</td><td>${row.status || '-'}</td>`;
        tr.addEventListener('click', () => {
          document.getElementById('student-id').value = row.student_id;
          document.getElementById('practice-student-id').value = row.student_id;
          document.getElementById('effects-student-id').value = row.student_id;
          switchPanel('panel-student');
        });
        studentsBody.appendChild(tr);
      });
      setStatus('名册加载完成');
    }

    function toIsoFromLocal(localValue) {
      if (!localValue) return null;
      const dt = new Date(localValue);
      return Number.isNaN(dt.getTime()) ? null : dt.toISOString();
    }

    function toLocalFromIso(isoValue) {
      if (!isoValue) return '';
      const dt = new Date(isoValue);
      if (Number.isNaN(dt.getTime())) return '';
      const pad = (v) => String(v).padStart(2, '0');
      return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    }

    function parseQuestionIdsInput(raw) {
      const text = String(raw || '').trim();
      if (!text) return null;
      const items = text.split(',').map(s => s.trim()).filter(Boolean);
      return items.length ? Array.from(new Set(items)) : null;
    }

    function getRuntimeStatus(exam) {
      const base = (exam.effective_status || exam.status || '').toLowerCase();
      return base || 'draft';
    }

    function getStatusLabel(exam) {
      const raw = (exam.status || '').toLowerCase();
      const runtime = getRuntimeStatus(exam);
      if (raw === 'draft') return '草稿';
      if (raw === 'archived') return '已归档';
      if (raw === 'ended' || runtime === 'ended') return '已结束';
      if (runtime === 'active') return '进行中';
      if (raw === 'published') return '已发布';
      if (raw === 'active') return '进行中';
      return raw || '-';
    }

    function getAvailableActions(exam) {
      const runtime = getRuntimeStatus(exam);
      const attemptsTotal = Number(exam?.stats?.attempts_total || 0);
      const submittedTotal = Number(exam?.stats?.submitted_total || 0);
      const hasActivity = attemptsTotal > 0 || submittedTotal > 0;
      return {
        canUpdate: !['ended', 'archived'].includes(exam.status),
        canPublish: exam.status === 'draft',
        canUnpublish: exam.status === 'published' && runtime === 'published' && !hasActivity,
        canEnd: exam.status === 'active' || exam.status === 'published' || runtime === 'active',
        canArchive: ['draft', 'published', 'active', 'ended'].includes(exam.status),
        canDelete: exam.status === 'draft' && !hasActivity,
      };
    }

    const ExamService = {
      async request(url, options = {}) {
        const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', ...options });
        const body = await res.json().catch(() => ({}));
        if (!res.ok || (typeof body.code === 'number' && body.code !== 0)) {
          const err = new Error(this.translateError(body, res.status));
          err.httpStatus = res.status;
          err.codeName = body?.message || '';
          err.reason = body?.data?.reason || '';
          err.payload = body?.data || {};
          throw err;
        }
        return body && body.data !== undefined ? body.data : body;
      },
      translateError(body, httpStatus) {
        const codeName = body?.message || '';
        const reason = body?.data?.reason || '';
        const map = {
          '400_INVALID_STATE': reason || '当前考试状态不允许该操作',
          '409_HAS_SUBMISSIONS': '已有学生开始/提交，无法撤回或删除，请改为归档',
          '403_FORBIDDEN': '你没有权限操作该考试',
          '404_NOT_FOUND': '考试不存在或已被移除',
          '422_TIME_INVALID': reason || '开始/结束时间不合法',
        };
        if (map[codeName]) return map[codeName];
        if (codeName === 'conflict' && /attempt|submit|submission|already/.test(reason)) return '已有学生作答，当前操作被拒绝';
        if (codeName === 'forbidden') return '你没有权限操作该考试';
        if (codeName === 'not_found') return '考试不存在或无访问权限';
        if (codeName === 'invalid_params' && /start_at|end_at/.test(reason)) return '开始/结束时间格式错误';
        return reason || codeName || `HTTP ${httpStatus}`;
      },
      async list(params = {}) {
        const q = new URLSearchParams({ limit: String(params.limit || 50), offset: String(params.offset || 0) });
        if (params.class_id) q.set('class_id', String(params.class_id));
        if (params.status) q.set('status', String(params.status));
        if (params.keyword) q.set('keyword', String(params.keyword));
        return this.request('/api/teacher/exams?' + q.toString());
      },
      async get(examId) { return this.request(`/api/teacher/exams/${encodeURIComponent(examId)}`); },
      async getQuestions(examId, { includeAnswer = false, includeAnalysis = false } = {}) {
        const q = new URLSearchParams({ include_answer: includeAnswer ? 'true' : 'false', include_analysis: includeAnalysis ? 'true' : 'false' });
        return this.request(`/api/teacher/exams/${encodeURIComponent(examId)}/questions?` + q.toString());
      },
      async createDraft(payload) { return this.request('/api/teacher/exams', { method: 'POST', body: JSON.stringify(payload) }); },
      async update(examId, payload) { return this.request(`/api/teacher/exams/${encodeURIComponent(examId)}`, { method: 'PATCH', body: JSON.stringify(payload) }); },
      async publish(examId) { return this.request(`/api/teacher/exams/${encodeURIComponent(examId)}/publish`, { method: 'POST', body: '{}' }); },
      async unpublish(examId) { return this.request(`/api/teacher/exams/${encodeURIComponent(examId)}/unpublish`, { method: 'POST', body: '{}' }); },
      async end(examId) { return this.request(`/api/teacher/exams/${encodeURIComponent(examId)}/end`, { method: 'POST', body: '{}' }); },
      async archive(examId) { return this.request(`/api/teacher/exams/${encodeURIComponent(examId)}/archive`, { method: 'POST', body: '{}' }); },
      async remove(examId) { return this.request(`/api/teacher/exams/${encodeURIComponent(examId)}`, { method: 'DELETE' }); },
    };

    function applyExamDetailState(exam) {
      const actions = getAvailableActions(exam);
      document.getElementById('btn-exam-update').disabled = !actions.canUpdate;
      document.getElementById('btn-exam-publish').disabled = !actions.canPublish;
      document.getElementById('btn-exam-unpublish').disabled = !actions.canUnpublish;
      document.getElementById('btn-exam-end').disabled = !actions.canEnd;
      document.getElementById('btn-exam-archive').disabled = !actions.canArchive;
      document.getElementById('btn-exam-delete').disabled = !actions.canDelete;

      const draftOnlyDisabled = exam.status !== 'draft';
      document.getElementById('exam-detail-class').disabled = draftOnlyDisabled;
      document.getElementById('exam-detail-count').disabled = draftOnlyDisabled;
      document.getElementById('exam-detail-category').disabled = draftOnlyDisabled;
      document.getElementById('exam-detail-question-ids').disabled = draftOnlyDisabled;
    }

    async function fillExamDetailQuestions(examId) {
      try {
        const payload = await ExamService.getQuestions(examId, { includeAnswer: false, includeAnalysis: false });
        const ids = (payload.items || []).map(i => i.question_id).filter(Boolean);
        document.getElementById('exam-detail-question-ids').value = ids.join(',');
      } catch (_) {
        document.getElementById('exam-detail-question-ids').value = '';
      }
    }

    async function createExam() {
      const classId = document.getElementById('exam-filter-class').value.trim() || classSelect.value;
      if (!classId) throw new Error('请先选择班级');
      const payload = {
        class_id: Number(classId),
        title: document.getElementById('exam-title').value.trim() || undefined,
        question_count: Number(document.getElementById('exam-count').value || 10),
        category: document.getElementById('exam-category').value.trim() || null,
        start_at: toIsoFromLocal(document.getElementById('exam-start-at').value),
        end_at: toIsoFromLocal(document.getElementById('exam-end-at').value),
        allow_multiple_attempts: document.getElementById('exam-allow-multiple').checked,
      };
      const qids = parseQuestionIdsInput(document.getElementById('exam-question-ids').value);
      if (qids) payload.question_ids = qids;
      const data = await ExamService.createDraft(payload);
      document.getElementById('exam-id').value = data.exam_id;
      document.getElementById('scores-exam-id').value = data.exam_id;
      document.getElementById('analysis-exam-id').value = data.exam_id;
      setExamActionStatus('草稿创建成功', true);
      setStatus('草稿创建成功');
      await loadExams();
      await loadExamDetail(data.exam_id);
    }

    function createActionButton(text, className, onClick) {
      const btn = document.createElement('button');
      btn.className = className;
      btn.type = 'button';
      btn.textContent = text;
      btn.style.marginRight = '6px';
      btn.addEventListener('click', (e) => { e.stopPropagation(); onClick(); });
      return btn;
    }

    async function runExamAction(action, exam) {
      const target = exam || currentExam;
      if (!target?.exam_id) return;
      const id = target.exam_id;
      const confirmTextMap = {
        unpublish: '确认撤回发布？仅在无人开始/提交时可成功。',
        end: '确认结束考试？结束后学生将无法继续提交。',
        archive: '确认归档该考试？归档后默认不在列表展示。',
        delete: '确认软删除该考试？仅草稿且无人作答时允许。',
      };
      if (confirmTextMap[action] && !(await dialogConfirm(confirmTextMap[action], { title: '请确认操作' }))) return;
      setExamActionStatus('正在执行操作...', true);
      let data = null;
      if (action === 'publish') data = await ExamService.publish(id);
      if (action === 'unpublish') data = await ExamService.unpublish(id);
      if (action === 'end') data = await ExamService.end(id);
      if (action === 'archive') data = await ExamService.archive(id);
      if (action === 'delete') data = await ExamService.remove(id);
      const successTextMap = {
        publish: '发布成功',
        unpublish: '撤回成功',
        end: '考试已结束，学生将无法继续提交',
        archive: '归档成功',
        delete: '删除成功（软删除）',
      };
      setExamActionStatus(successTextMap[action] || '操作成功', true);
      asJson(examJsonEl, data || {}, '考试操作结果');
      await loadExams();
      await loadExamDetail(id);
    }

    async function loadExams() {
      const classId = document.getElementById('exam-filter-class').value.trim() || classSelect.value || '';
      const status = document.getElementById('exam-filter-status').value.trim();
      const keyword = document.getElementById('exam-filter-keyword').value.trim();
      const data = await ExamService.list({ class_id: classId || undefined, status: status || undefined, keyword: keyword || undefined, limit: 50, offset: 0 });
      examsBody.innerHTML = '';
      (data.items || []).forEach((row) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.exam_id}</td><td>${row.title || '-'}</td><td>${row.class_name || row.class_id || '-'}</td><td>${row.question_count || 0}</td><td>${getStatusLabel(row)}</td><td>${row.start_at || '-'}</td><td>${row.end_at || '-'}</td><td>${row?.stats?.submitted_total ?? 0}</td><td></td>`;
        const actionsCell = tr.querySelector('td:last-child');
        const actions = getAvailableActions(row);
        if (actions.canPublish) actionsCell.appendChild(createActionButton('发布', 'btn', () => runExamAction('publish', row).catch(e => setExamActionStatus(e.message, false))));
        if (actions.canUnpublish) actionsCell.appendChild(createActionButton('撤回', 'btn secondary', () => runExamAction('unpublish', row).catch(e => setExamActionStatus(e.message, false))));
        if (actions.canEnd) actionsCell.appendChild(createActionButton('结束', 'btn secondary', () => runExamAction('end', row).catch(e => setExamActionStatus(e.message, false))));
        if (actions.canArchive) actionsCell.appendChild(createActionButton('归档', 'btn secondary', () => runExamAction('archive', row).catch(e => setExamActionStatus(e.message, false))));
        if (actions.canDelete) actionsCell.appendChild(createActionButton('删除', 'btn danger', () => runExamAction('delete', row).catch(e => setExamActionStatus(e.message, false))));
        if (!actionsCell.childElementCount) actionsCell.textContent = '-';
        tr.addEventListener('click', async () => {
          document.getElementById('exam-id').value = row.exam_id;
          document.getElementById('scores-exam-id').value = row.exam_id;
          document.getElementById('analysis-exam-id').value = row.exam_id;
          await loadExamDetail(row.exam_id);
        });
        examsBody.appendChild(tr);
      });
      setStatus('考试列表加载完成');
    }

    async function loadExamDetail(examIdOverride = '') {
      const id = (examIdOverride || document.getElementById('exam-id').value || '').trim();
      if (!id) return;
      const exam = await ExamService.get(id);
      currentExam = exam;
      document.getElementById('exam-id').value = exam.exam_id;
      document.getElementById('exam-detail-title').value = exam.title || '';
      document.getElementById('exam-detail-class').value = exam.class_id ?? '';
      document.getElementById('exam-detail-count').value = exam.question_count ?? '';
      document.getElementById('exam-detail-category').value = exam.category || '';
      document.getElementById('exam-detail-start-at').value = toLocalFromIso(exam.start_at);
      document.getElementById('exam-detail-end-at').value = toLocalFromIso(exam.end_at);
      document.getElementById('exam-detail-allow-multiple').checked = !!exam.allow_multiple_attempts;
      document.getElementById('exam-detail-status').textContent = getStatusLabel(exam);
      document.getElementById('exam-detail-attempts').textContent = exam?.stats?.attempts_total ?? 0;
      document.getElementById('exam-detail-submitted').textContent = exam?.stats?.submitted_total ?? 0;
      document.getElementById('exam-detail-avg').textContent = exam?.stats?.avg_score ?? 0;
      await fillExamDetailQuestions(id);
      applyExamDetailState(exam);
      asJson(examJsonEl, exam, '考试详情');
    }

    async function updateExamFromDetail() {
      if (!currentExam?.exam_id) throw new Error('请先加载考试详情');
      const payload = {
        title: document.getElementById('exam-detail-title').value.trim(),
        start_at: toIsoFromLocal(document.getElementById('exam-detail-start-at').value),
        end_at: toIsoFromLocal(document.getElementById('exam-detail-end-at').value),
        allow_multiple_attempts: document.getElementById('exam-detail-allow-multiple').checked,
      };
      if (currentExam.status === 'draft') {
        payload.class_id = Number(document.getElementById('exam-detail-class').value || currentExam.class_id || 0);
        payload.question_count = Number(document.getElementById('exam-detail-count').value || currentExam.question_count || 0);
        payload.category = document.getElementById('exam-detail-category').value.trim() || null;
        const qids = parseQuestionIdsInput(document.getElementById('exam-detail-question-ids').value);
        if (qids) payload.question_ids = qids;
      }
      const data = await ExamService.update(currentExam.exam_id, payload);
      setExamActionStatus('考试信息已保存', true);
      asJson(examJsonEl, data, '保存结果');
      await loadExams();
      await loadExamDetail(currentExam.exam_id);
    }

    async function publishFromDetail() {
      if (!currentExam?.exam_id) throw new Error('请先加载考试详情');
      if (currentExam.status === 'draft') {
        await updateExamFromDetail();
      }
      await runExamAction('publish');
    }

    async function loadExamQuestions() {
      const id = document.getElementById('exam-id').value.trim();
      if (!id) return;
      asJson(examJsonEl, await ExamService.getQuestions(id, { includeAnswer: true, includeAnalysis: true }), '固定卷题目详情');
    }

    async function loadScores() {
      const classId = document.getElementById('scores-class-id').value.trim();
      const examId = document.getElementById('scores-exam-id').value.trim();
      if (!classId || !examId) return;
      const data = await api(`/api/teacher/classes/${classId}/scores?exam_id=${encodeURIComponent(examId)}&limit=100&offset=0`);
      scoresBody.innerHTML = '';
      (data.items || []).forEach((row) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.student_id}</td><td>${row.student_no || '-'}</td><td>${row.name || '-'}</td><td>${row.attempt_id || '-'}</td><td>${row.score ?? '-'}/${row.total ?? '-'}</td><td>${row.accuracy ?? '-'}</td>`;
        tr.addEventListener('click', () => {
          document.getElementById('student-id').value = row.student_id;
          document.getElementById('practice-student-id').value = row.student_id;
          document.getElementById('effects-student-id').value = row.student_id;
          if (row.attempt_id) document.getElementById('attempt-id').value = row.attempt_id;
          switchPanel('panel-student');
        });
        scoresBody.appendChild(tr);
      });
      setStatus('成绩加载完成');
    }

    async function loadStudentOverview() { const id = document.getElementById('student-id').value.trim(); if (!id) return; asJson(document.getElementById('student-json'), await api(`/api/teacher/students/${id}/overview?range=30d`), '学生概览'); }
    async function loadStudentAttempts() { const id = document.getElementById('student-id').value.trim(); if (!id) return; const data = await api(`/api/teacher/students/${id}/attempts?limit=30&offset=0`); asJson(document.getElementById('student-json'), data, '学生作答记录'); if (data.items?.[0]?.attempt_id) document.getElementById('attempt-id').value = data.items[0].attempt_id; }
    async function loadStudentWrongs() { const id = document.getElementById('student-id').value.trim(); if (!id) return; asJson(document.getElementById('student-json'), await api(`/api/teacher/students/${id}/wrongs?limit=50&offset=0`), '学生错题本'); }
    async function loadStudentAnalysis() { const id = document.getElementById('student-id').value.trim(); if (!id) return; asJson(document.getElementById('student-json'), await api(`/api/teacher/students/${id}/analysis?range=30d`), '学生分析'); }
    async function loadAttemptDetail() { const id = document.getElementById('attempt-id').value.trim(); if (!id) return; asJson(document.getElementById('student-json'), await api(`/api/teacher/attempts/${id}?include_analysis=true`), '作答回放详情'); }

    async function createPractice() {
      const studentId = document.getElementById('student-id').value.trim();
      if (!studentId) return;
      const title = document.getElementById('practice-title').value.trim();
      const payload = { count: Number(document.getElementById('practice-count').value || 10), strategy: 'most_wrong_first' };
      if (title) payload.title = title;
      const data = await api(`/api/teacher/students/${studentId}/wrongs/practice`, { method: 'POST', body: JSON.stringify(payload) });
      asJson(document.getElementById('student-json'), data, '强化练习生成结果');
      setStatus('错题强化已生成');
      document.getElementById('practice-student-id').value = studentId;
      document.getElementById('effects-student-id').value = studentId;
      await loadPractices();
    }

    async function loadPractices() {
      const studentId = document.getElementById('practice-student-id').value.trim();
      const status = document.getElementById('practice-status').value.trim();
      const q = new URLSearchParams({ limit: '50', offset: '0' });
      if (studentId) q.set('student_id', studentId);
      if (status) q.set('status', status);
      const data = await api('/api/teacher/practices?' + q.toString());
      practicesBody.innerHTML = '';
      (data.items || []).forEach((row) => {
        const tr = document.createElement('tr');
        const latest = row.latest_attempt ? `${row.latest_attempt.score}/${row.latest_attempt.total} ${row.latest_attempt.submitted_at || ''}` : '-';
        tr.innerHTML = `<td>${row.practice_exam_id}</td><td>${row.title || '-'}</td><td>${row.student_name || '-'} (${row.student_id || '-'})</td><td>${row.selected_count ?? '-'}</td><td>${row.status || '-'}</td><td>${row.created_at || '-'}</td><td>${latest}</td><td></td>`;
        const opTd = tr.querySelector('td:last-child');
        if (row.status !== 'archived') {
          const btn = document.createElement('button');
          btn.className = 'btn secondary';
          btn.textContent = '归档';
          btn.addEventListener('click', async () => {
            await api(`/api/teacher/practices/${encodeURIComponent(row.practice_exam_id)}/archive`, { method: 'POST', body: JSON.stringify({}) });
            await loadPractices();
          });
          opTd.appendChild(btn);
        } else {
          opTd.textContent = '-';
        }
        tr.addEventListener('click', () => {
          if (row.student_id) {
            document.getElementById('effects-student-id').value = row.student_id;
          }
        });
        practicesBody.appendChild(tr);
      });
      setStatus('练习列表加载完成');
    }

    async function loadPracticeEffects() {
      const studentId = document.getElementById('effects-student-id').value.trim();
      if (!studentId) return;
      const data = await api(`/api/teacher/students/${studentId}/practice_effects?limit=50&offset=0`);
      asJson(document.getElementById('effects-json'), data, '强化练习效果');
      setStatus('练习效果加载完成');
    }

    async function exportScores() {
      const classId = Number(document.getElementById('analysis-class-id').value || 0);
      const examId = document.getElementById('analysis-exam-id').value.trim();
      const data = await api('/api/teacher/exports/scores', { method: 'POST', body: JSON.stringify(examId ? { class_id: classId, exam_id: examId } : { class_id: classId }) });
      const box = document.createElement('div'); box.className = 'card'; box.innerHTML = `<div class="pill">${data.filename}</div><a href="${data.download_url}" target="_blank">下载</a>`; downloadLinks.prepend(box);
    }
    async function exportWrongs() {
      const studentId = Number(document.getElementById('student-id').value || 0);
      const classId = Number(document.getElementById('analysis-class-id').value || 0);
      const examId = document.getElementById('analysis-exam-id').value.trim();
      const payload = studentId ? { student_id: studentId } : { class_id: classId, exam_id: examId || undefined };
      const data = await api('/api/teacher/exports/wrongs', { method: 'POST', body: JSON.stringify(payload) });
      const box = document.createElement('div'); box.className = 'card'; box.innerHTML = `<div class="pill">${data.filename}</div><a href="${data.download_url}" target="_blank">下载</a>`; downloadLinks.prepend(box);
    }

    const teacherMenu = document.getElementById('teacher-menu');
    if (teacherMenu) {
      teacherMenu.addEventListener('click', (e) => {
        const a = e.target.closest('a[data-panel]');
        if (!a) return;
        e.preventDefault();
        switchPanel(a.dataset.panel);
      });
    }
    bindClick('btn-load-classes', () => loadClasses().catch(e => setStatus(e.message, false)));
    bindClick('btn-load-students', () => loadStudents().catch(e => setStatus(e.message, false)));
    bindClick('btn-create-exam', () => createExam().catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-load-exams', () => loadExams().catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-load-exam-detail', () => loadExamDetail().catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-load-exam-questions', () => loadExamQuestions().catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-exam-update', () => updateExamFromDetail().catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-exam-publish', () => publishFromDetail().catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-exam-unpublish', () => runExamAction('unpublish').catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-exam-end', () => runExamAction('end').catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-exam-archive', () => runExamAction('archive').catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-exam-delete', () => runExamAction('delete').catch(e => setExamActionStatus(e.message, false)));
    bindClick('btn-load-scores', () => loadScores().catch(e => setStatus(e.message, false)));
    bindClick('btn-student-overview', () => loadStudentOverview().catch(e => setStatus(e.message, false)));
    bindClick('btn-student-attempts', () => loadStudentAttempts().catch(e => setStatus(e.message, false)));
    bindClick('btn-student-wrongs', () => loadStudentWrongs().catch(e => setStatus(e.message, false)));
    bindClick('btn-student-analysis', () => loadStudentAnalysis().catch(e => setStatus(e.message, false)));
    bindClick('btn-attempt-detail', () => loadAttemptDetail().catch(e => setStatus(e.message, false)));
    bindClick('btn-practice', () => createPractice().catch(e => setStatus(e.message, false)));
    bindClick('btn-load-practices', () => loadPractices().catch(e => setStatus(e.message, false)));
    bindClick('btn-load-effects', () => loadPracticeEffects().catch(e => setStatus(e.message, false)));
    bindClick('btn-export-scores', () => exportScores().catch(e => setStatus(e.message, false)));
    bindClick('btn-export-wrongs', () => exportWrongs().catch(e => setStatus(e.message, false)));

    if (classSelect) {
      classSelect.addEventListener('change', () => {
        document.getElementById('scores-class-id').value = classSelect.value;
        document.getElementById('analysis-class-id').value = classSelect.value;
        if (!document.getElementById('exam-filter-class').value) {
          document.getElementById('exam-filter-class').value = classSelect.value;
        }
      });
    }

    (async function init() {
      try {
        smartOutput.renderEmpty(examJsonEl);
        smartOutput.renderEmpty(document.getElementById('student-json'));
        smartOutput.renderEmpty(document.getElementById('effects-json'));
        await loadProfile();
        await loadClasses();
        if (classSelect.value) {
          document.getElementById('exam-filter-class').value = classSelect.value;
        }
        await loadStudents();
        await loadExams();
        await loadPractices();
      } catch (e) {
        setStatus(`初始化失败：${e.message}`, false);
      }
    })();
  </script>
</body>
</html>
